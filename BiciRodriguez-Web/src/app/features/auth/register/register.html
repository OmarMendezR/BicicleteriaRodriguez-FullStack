<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg border-0 p-4" style="width: 400px; border-radius: 15px;">
    <div class="text-center mb-4">
      <i class="bi bi-bicycle text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2">Crear Cuenta</h2>
      <p class="text-muted">Únete a Bici Rodríguez</p>
    </div>

    <form #f="ngForm" (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre Completo</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control border-start-0" name="nombre" 
                 [(ngModel)]="regData.nombreCompleto" placeholder="Ej: Omar Méndez" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Correo Electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control border-start-0" name="email" 
                 [(ngModel)]="regData.email" placeholder="correo@ejemplo.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control border-start-0" name="pass" 
                 [(ngModel)]="regData.password" placeholder="********" required>
        </div>
      </div>

      <div *ngIf="mensajeError" class="alert alert-danger py-2 small">
        {{ mensajeError }}
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" [disabled]="!f.valid">
        Registrarse ahora
      </button>

      <div class="text-center mt-4">
        <span class="text-muted small">¿Ya eres parte del equipo?</span><br>
        <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Inicia Sesión aquí</a>
      </div>
    </form>
  </div>
</div>
